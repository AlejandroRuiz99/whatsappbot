# ─── Conversación y memoria ───
# maxMessages 10→16 y ttlHours 24→72 (2026-06): 10 mensajes se quedaban cortos
# para la cualificación legal (edad/años/país) antes de vender, y un TTL de 24h
# borraba la conversación antes de que saltara el recontacto programado (cita
# médica "esta semana"), dejando a Clara sin contexto al reenganchar.
conversation:
  maxMessagesPerConversation: 16
  maxConversations: 1000
  ttlHours: 72
  ragCacheTtlMinutes: 10
  cleanupIntervalMinutes: 60

# ─── Humanización (delays y formato WhatsApp) ───
# Basado en análisis de 119 chats reales: mensajes cortos, 3-6 burbujas por turno
humanizer:
  whatsappMaxLength: 160

  cohesiveBlock:
    maxSentences: 2
    maxLength: 280
    probability: 0.2

  readingDelay:
    veryShort: [300, 800]     # <20 chars
    short: [800, 1800]        # <80 chars
    medium: [1500, 3000]      # <200 chars
    long: [2500, 4500]        # 200+ chars

  typingDelay:
    veryShort: [1500, 3000]   # <30 chars
    short: [2500, 5000]       # <80 chars
    medium:                    # <180 chars
      charsPerSecond: 40
      min: 3500
      max: 8000
    long:                      # 180+ chars
      charsPerSecond: 35
      min: 5000
      max: 12000

  pauseBetweenMessages:
    shortNext: [3000, 5000]   # siguiente <30 chars
    mediumNext: [5000, 8000]  # siguiente <100 chars
    longNext: [7000, 11000]   # siguiente 100+ chars
    firstMessageFactor: 0.8
    lastMessageExtra: [1000, 3000]

# ─── WhatsApp / Baileys ───
whatsapp:
  debounceMs: 1500
  reconnectDelayMs: 5000
  mediaDelay: [1000, 2500]
  closureReactionDelay: [500, 1500]

# ─── Escalado a humano ───
# Detección usa fronteras de palabra (unicode-aware) + guard de negación
# de 4 tokens antes del match. Por eso "no es urgente" NO escala.
# Keywords aquí, lógica en src/conversation/escalation/escalate.ts.
escalation:
  repeatMessageThreshold: 3
  urgencyKeywords:
    - urgente
    - emergencia
    - hablar con alguien
    - persona real
    - abogado real
    - cuanto antes
    - ya mismo
    - inmediato
  negativeKeywords:
    - no entiendo
    - no me sirve
    - no me ayuda
    - queja
    - enfadado
    - enfadada
    - harto
    - harta
    - indignado
    - indignada
    - esto es una mierda
    - no sirve
    - inutil
    - inútil
    - vergüenza
    - estafa
    - timo
    - engaño
    - mentira
    - ridiculo
    - ridículo
  complexityKeywords:
    - no lo entiendo
    - me he perdido
    - no me queda claro
    - puedes repetir
    - puede repetir
    - no se que hacer
    - no sé qué hacer
  # El cliente pide expresamente que el despacho le llame. Se notifica al
  # equipo (Telegram) y se responde con MESSAGES.callRequest, que confirma
  # que una compañera le llamará para agendar (MEJORAS BOT 2026-06).
  callRequestKeywords:
    - me podéis llamar
    - me podeis llamar
    - me pueden llamar
    - me puede llamar
    - pueden llamarme
    - puede llamarme
    - podéis llamarme
    - podeis llamarme
    - que me llamen
    - que me llame
    - que me llaméis
    - que me llameis
    - llamadme
    - llámame
    - llamame
    - llámenme
    - llamenme
    - prefiero una llamada
    - prefiero que me llamen
    - mejor llamadme
    - mejor por teléfono
    - mejor por telefono
    - prefiero por teléfono
    - prefiero por telefono

# ─── LLM (modelos y parámetros) ───
# temperature bajada 0.85 → 0.7 (2026-06): con 0.85 el modelo a veces se
# re-saludaba a mitad de conversación, mezclaba usted/tú o divagaba de tema.
# 0.7 mantiene naturalidad pero sigue mejor las reglas del prompt.
llm:
  groq:
    model: "llama-3.3-70b-versatile"
    maxTokens: 600
    temperature: 0.7
    topP: 0.9
    presencePenalty: 0.3
    frequencyPenalty: 0.3
  openai:
    model: "gpt-3.5-turbo"
    maxTokens: 550
    temperature: 0.7
    topP: 0.9
    presencePenalty: 0.3
    frequencyPenalty: 0.3

# ─── Derivación a consulta (soft limits) ───
# Ajustado: en los chats reales la cualificación ocupa 2-3 mensajes antes de vender.
# Phase1 = solo cualificación (preguntas). Phase2 = ancla positiva + mención natural.
# Phase3 = propuesta directa. Phase4 = no más info gratis.
softLimits:
  phase1:
    maxChars: 300
    maxMessages: 4
  phase2:
    maxChars: 600
    maxMessages: 6
  phase3:
    maxChars: 900
    maxMessages: 8
  consultationPrice: "69 euros"         # Consulta genérica (laboral, civil, familia...)
  studyPrice: "120 euros"              # Estudio personalizado jubilación
  subscriptionLabel: "suscripción mensual"  # Para casos de incapacidad sin resolución

# ─── RAG ───
rag:
  maxVideoRecommendations: 3
  snippetLength: 200
  pinecone:
    dimension: 1536
    indexCheckMaxAttempts: 30
    indexCheckIntervalMs: 10000

# ─── Extranjería (derivación a número específico) ───
extranjeria:
  redirectPhone: "640569537"
  # Single source of truth — read by src/pipeline/handlers/extranjeria.ts at runtime.
  # Master prompt §4.1: "El código no contiene constantes de negocio".
  keywords:
    # OJO: NO incluir "residencia" a secas — colisiona con pensiones, donde el
    # cliente dice "10 años de residencia legal en España" (PNC/IMV/jubilación)
    # y sería redirigido por error a extranjería. Las formas inequívocas de
    # extranjería ya están cubiertas: "permiso de residencia", "tarjeta de
    # residencia", "tarjeta comunitaria", "arraigo", etc.
    - permiso de residencia
    - permiso de trabajo
    - nacionalidad
    - nacionalidad española
    - ciudadanía
    - nie
    - tarjeta de residencia
    - tarjeta comunitaria
    - arraigo
    - arraigo social
    - arraigo laboral
    - arraigo familiar
    - reagrupación
    - reagrupacion
    - reagrupación familiar
    - regularizar
    - regularización
    - regularizacion
    - papeles
    - asilo
    - refugiado
    - protección internacional
    - expulsión
    - expulsion
    - deportación
    - deportacion
    - extranjería
    - extranjeria
    - inmigrante
    - immigrante
    - visado
    - visa
    - entrada en españa
    - permiso de estancia

# ─── Horarios (saludo contextual) ───
timeGreeting:
  morningStart: 6
  afternoonStart: 14
  nightStart: 21

# ─── Filtro de respuesta (Phase 9, master prompt §5.4) ───
# Validates LLM output before sending. On violation, llm.service retries ONCE
# with a corrective system addon. If the retry also fails, the provider is
# treated as failed (next provider or local fallback takes over).
# Authorized prices = softLimits.consultationPrice/studyPrice + authorizedPrices
# + every digit group in catalog precioOrientativo. Anything else is flagged.
responseFilter:
  maxLength: 1500
  maxParagraphs: 6
  # Importes oficiales del tarifario (MEJORAS BOT 2026-06) que el bot puede
  # mencionar además de los de softLimits: trámites con IVA aparte.
  authorizedPrices: ["69", "70", "120", "165", "180", "250", "330", "630"]
  bannedPhrases:
    # Identity violations — Clara is administrative, not lawyer
    - soy abogada
    - soy abogado
    - como abogada
    - como abogado
    - en mi opinión legal
    - mi opinion legal
    # Guarantees / promises the firm cannot make
    - tienes derecho a
    - tiene derecho a
    - tienen derecho a
    - garantizo
    - garantizamos
    - te garantizo
    - le garantizo
    - seguro que gana
    - seguro que ganas
    - sin duda ganarás
    - sin duda ganaras
    - 100% seguro
    - cien por cien seguro
    - es seguro que
    # AI self-disclosure (kills the human-staff illusion)
    - soy una ia
    - soy un bot
    - soy un asistente virtual
    - como modelo de lenguaje
    - como inteligencia artificial
    # Lenguaje de coste — hablar siempre de valor/inversión (MEJORAS BOT 2026-06)
    - el coste
    - coste de la consulta
    - cuesta
    - costaría
    - costaria
    # Promesas de llamada espontáneas — solo la vía de solicitud de llamada
    - te llamaremos
    - le llamaremos
    - la llamaremos
    - lo llamaremos
    - te llamo yo
    - le llamo yo

# ─── Alertas de intervención humana (panel admin) ───
# Cada escalado crea una alerta pendiente que pausa las respuestas del bot
# para ese número (un humano toma el caso). Resolver la alerta desde /admin
# reactiva el bot; pauseHours es la caducidad de seguridad por si se olvida.
alerts:
  pauseHours: 24

# ─── Recontacto programado (follow-ups, MEJORAS BOT 2026-06) ───
# Cuando el cliente aplaza ("el jueves tengo cita médica, luego os escribo"),
# el bot programa un recontacto. Detección por señales (substring, solo
# mensajes del usuario); el día concreto se extrae en
# src/conversation/followup/detector.ts. Un mensaje nuevo del cliente cancela
# el recontacto pendiente. Horas en huso Europe/Madrid.
followUp:
  enabled: true
  checkIntervalMinutes: 5
  defaultDelayDays: 3
  defaultSendHour: 11       # recontactos genéricos ("me lo pienso")
  weekdaySendHour: 18       # cuando menciona un día concreto (tras su cita)
  sendWindowStartHour: 10
  sendWindowEndHour: 20
  citaMedicaSignals:
    - cita médica
    - cita medica
    - cita con el médico
    - cita con el medico
    - cita con el especialista
    - tribunal médico
    - tribunal medico
    - revisión médica
    - revision medica
  signals:
    - os escribo
    - les escribo
    - os aviso
    - les aviso
    - ya os digo
    - ya les digo
    - os digo algo
    - les digo algo
    - más adelante
    - mas adelante
    - la semana que viene
    - el mes que viene
    - a final de mes
    - a fin de mes
    - cuando cobre
