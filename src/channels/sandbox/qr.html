<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="{{REFRESH_META}}">
  <title>WhatsApp Bot - Autenticación</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      max-width: 400px;
    }
    h1 { margin-bottom: 10px; color: #25D366; }
    .subtitle { color: #aaa; margin-bottom: 30px; }
    .qr-container {
      background: white;
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
      margin: 20px 0;
    }
    .qr-container img { display: block; }
    .status {
      padding: 10px 20px;
      border-radius: 20px;
      display: inline-block;
      margin-top: 20px;
      font-weight: bold;
    }
    .status.connected { background: #25D366; }
    .status.disconnected { background: #e74c3c; }
    .status.connecting { background: #f39c12; }
    .instructions {
      margin-top: 30px;
      text-align: left;
      background: rgba(0,0,0,0.2);
      padding: 20px;
      border-radius: 10px;
    }
    .instructions li { margin: 10px 0; color: #ddd; }
    a.btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 WhatsApp Bot</h1>
    <p class="subtitle">Compromiso Legal</p>
    
    {{CONTENT}}
    
    <div class="status {{STATUS_CLASS}}">
      {{STATUS_TEXT}}
    </div>
  </div>
</body>
</html>
